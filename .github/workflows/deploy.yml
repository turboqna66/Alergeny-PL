name: Deploy do GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Zainstaluj zależności
        run: npm install

      - name: Zbuduj aplikację
        run: npm run build

      - name: Przygotuj Pages
        uses: actions/configure-pages@v5

      - name: Wgraj artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wystaw na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
